  daily_reminder_afternoon:
    cron: "0 0 15 * * ? *"
    message: "§eSelamat sore!§f Lelah beraktivitas? Yuk santai sejenak di RumahKita.\n§r"
    message_color: "white"

  daily_reminder_night:
    cron: "0 0 20 * * ? *"
    message: "§eSelamat malam!§f Jangan lupa istirahat kalau sudah capek ya.\n§r"
    message_color: "white"
