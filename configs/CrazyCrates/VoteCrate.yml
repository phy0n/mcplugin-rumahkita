      Toggle: true
      Items:
        "1":
          name: " "
          lore: [ ]
          material: "lime_stained_glass_pane"
          amount: 1
      Random:
        Toggle: true
        Items:
          "1":
            name: " "
            lore: [ ]
            material: "yellow_stained_glass_pane"
            amount: 1
          "2":
            name: " "
            lore: [ ]
            material: "lime_stained_glass_pane"
            amount: 1
            
