  Settings:
    Tracking-Crate-Opening: true
    Border:
      Glass-Border:
        Toggle: true
    Broadcast:
      Toggle: false
      Messages:
        - "<red>%player% won the prize <yellow>%reward%."
      Permission: ""
    Rewards:
      Re-Roll-Spin: false
      Permission:
        Toggle: false
        Persist: false
        Max-Cap: 20
        
  Item: "paper"
  Hide-Flags: false
  Components:
    - "enchantments"
  Custom-Model-Data: -1
  Model:
    Namespace: ""
    Id: ""
  Glowing: "add_glow"
  Name: "<bold><yellow>⭐ Vote Crate ⭐</bold>"
  Lore:
