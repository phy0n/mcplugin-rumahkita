settings:
  prefix: "&8[&bRumahKitaGuilds&8] "
  create-cost:
    enabled: true
    material: DIAMOND
    amount: 5
  max-members-per-guild: 25
  tag:
    min-length: 2
    max-length: 5
    pattern: "^[A-Za-z0-9]+$"
  name:
    min-length: 3
    max-length: 24
  invite-expire-seconds: 120

guild-home:
  teleport-delay-seconds: 5
  cooldown-seconds: 60
  cancel-on-move: true
  cancel-distance: 0.35

guild-chat:
  enabled: true
  # /guildchat tanpa pesan = toggle mode guild chat.
  # /guildchat <pesan> atau /guild chat <pesan> = kirim sekali ke anggota guild.
  toggle-command: true
  admin-spy: false
  format: "&8[&bGuild &8| &f%guild_tag%&8] &e%role% &f%player% &8» &f%message%"
  spy-format: "&8[&cGuildSpy &8| &f%guild_tag%&8] &7%player% &8» &f%message%"

placeholder:
  no-guild: ""
  tag-format: "&8[&b%tag%&8]"
  role-leader: "Leader"
  role-admin: "Admin"
  role-member: "Member"

chat-format:
  enabled: false
  format: "%guild_tag% &7%player% &8» &f%message%"

gui:
  title: "&8RumahKita Guild"
  list-title: "&8Guild List"
  members-title: "&8Guild Members"
  size: 27

