  no-permission: "&cKamu tidak punya permission."
  reloaded: "&aSecurityBan berhasil direload."
  player-not-found: "&cPlayer tidak ditemukan di online/history."
  banned: "&cTarget berhasil diban ketat."
  ip-banned: "&cIP/Subnet berhasil diban."
  unbanned: "&aData ban berhasil dihapus."
  not-banned: "&eData itu tidak ditemukan di ban list."
  deny-message:
    - "&cKamu diblok dari RumahKita S2."
    - "&7Alasan: &f%reason%"
    - "&7Tipe: &f%type%"
    - ""
