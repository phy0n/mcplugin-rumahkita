enabled: true

security:
  check-uuid: true
  check-name: true
  check-ip: true
  check-subnet: true
  auto-ban-name: true
  auto-ban-last-ip: true
  auto-ban-subnet: true
  ipv4-subnet-prefix: 24
  ipv6-subnet-prefix: 64
  name-case-insensitive: true
  kick-online-target: true

history:
  enabled: true
  save-ip-history: true
  max-ips-per-player: 15
  save-name-history: true
  max-names-per-player: 10

